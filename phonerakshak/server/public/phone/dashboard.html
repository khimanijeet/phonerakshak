<!doctype html>
<html><head><meta charset="utf-8"><title>PhoneRakshak · Dashboard</title>
<meta name="viewport" content="width=390, initial-scale=1">
<link rel="stylesheet" href="/phone/_phone.css">
</head><body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span class="right">5G&nbsp;<span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;87%</span></div>
  <div class="scroll">
    <h1 class="title">PhoneRakshak Dashboard</h1>

    <div class="card" style="text-align:center">
      <button class="btn danger" style="font-size:16px; padding:18px 12px">EMERGENCY MODE</button>
      <div class="muted" style="margin-top:8px">Sound alarm, alert contact, share location</div>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div class="row"><span class="dot-status good"></span> Protection active</div>
      <div class="row"><span class="dot-status good"></span> Device admin enabled</div>
      <div class="row"><span class="dot-status good"></span> Connected: phonerakshak.replit.app</div>
    </div>

    <div class="card">
      <h2>Last Known Location</h2>
      <div class="muted" style="font-size:13px; line-height:1.5">
        28.6139°N, 77.2090°E<br>
        Connaught Place, New Delhi<br>
        Updated: 2 min ago
      </div>
      <button class="btn secondary">Open in Maps</button>
    </div>

    <div class="card">
      <h2>Quick Actions</h2>
      <button class="btn primary">Update Location</button>
      <button class="btn secondary">Test Alarm (10s)</button>
      <button class="btn secondary">Stop Alarm</button>
      <button class="btn secondary">Test lock screen</button>
      <button class="btn secondary">View intruder photos</button>
      <div class="muted" style="text-align:center; margin-top:6px">3 intruder photos</div>
    </div>

    <button class="btn secondary">Settings</button>
  </div>
</div>
</body></html>
