<!doctype html>
<html><head><meta charset="utf-8"><title>PhoneRakshak · Intruder Photos</title>
<meta name="viewport" content="width=390, initial-scale=1">
<link rel="stylesheet" href="/phone/_phone.css">
<style>
  .topbar{
    display:flex; align-items:center; gap:10px; padding:12px 16px;
    background:var(--bg);
  }
  .topbar h1{flex:1; font-size:18px; margin:0; font-weight:700;}
  .pill{
    background:var(--bg-elev); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:12px; font-weight:600;
  }
  .count{padding:0 16px 12px; color:var(--muted); font-size:13px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 8px 16px;}
  .thumb{
    aspect-ratio:3/4; background:#111; border-radius:8px; overflow:hidden; position:relative;
    background-image:radial-gradient(circle at 50% 38%, #6b6b6b 0 24%, #2a2a2a 25% 32%, #1a1a1a 33%);
  }
  .thumb .ts{
    position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.55);
    color:#fff; font-size:10px; padding:4px 6px; text-align:center;
  }
  .face{
    position:absolute; inset:18% 22% 40% 22%;
    background:linear-gradient(180deg,#a0856b,#8a6d52);
    border-radius:50% 50% 45% 45%/55% 55% 45% 45%;
  }
  .face::before{
    content:""; position:absolute; top:36%; left:22%; width:14%; height:6%;
    background:#1a1a1a; border-radius:50%;
    box-shadow:32px 0 0 #1a1a1a;
  }
</style>
</head><body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span class="right">5G&nbsp;<span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;42%</span></div>
  <div class="topbar">
    <button class="pill">Back</button>
    <h1>Intruder Photos</h1>
    <button class="pill">Delete All</button>
  </div>
  <div class="count">3 intruder photos</div>
  <div class="grid">
    <div class="thumb"><div class="face"></div><div class="ts">Today 14:22</div></div>
    <div class="thumb"><div class="face"></div><div class="ts">Today 11:08</div></div>
    <div class="thumb"><div class="face"></div><div class="ts">Yesterday 19:45</div></div>
    <div class="thumb"><div class="face"></div><div class="ts">Yesterday 08:12</div></div>
  </div>
</div>
</body></html>
